<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Card Not Found</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
            text-align: center;
        }

        /* Mini Error Punch Card */
        .punch-card {
            background-color: #eaddc5;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Cut corner on top left */
            clip-path: polygon(40px 0, 100% 0, 100% 100%, 0 100%, 0 40px);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            margin-bottom: 30px;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            color: #8c7b61;
            font-size: 14px;
            margin-bottom: 25px;
            padding-left: 10px;
            font-weight: bold;
            border-bottom: 2px dashed #d1c0a5;
            padding-bottom: 10px;
        }

        .error-code {
            color: #c0392b;
            font-size: 80px;
            font-weight: bold;
            letter-spacing: 10px;
            margin: 20px 0;
            text-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }

        .error-message {
            color: #5c4f3a;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Decorative punched holes for the 404 card */
        .holes-container {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
        }

        .hole {
            width: 15px;
            height: 25px;
            background-color: #2c3e50;
            border: 1px solid #1a252f;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }

        /* Buttons and Links */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        a.btn {
            background-color: #1abc9c;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            transition: background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        a.btn:hover {
            background-color: #16a085;
        }

        a.btn-status {
            background-color: transparent;
            color: #95a5a6;
            border: 1px solid #95a5a6;
            font-size: 14px;
            padding: 10px 20px;
            box-shadow: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        a.btn-status:hover {
            background-color: rgba(149, 165, 166, 0.1);
            color: #ecf0f1;
            border-color: #ecf0f1;
        }

        /* Status Dot Animation */
        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="punch-card">
        <div class="card-header">
            <span>SYSTEM EXCEPTION</span>
            <span>READ ERROR</span>
        </div>
        
        <div class="error-code">404</div>
        <div class="error-message">CARD NOT FOUND IN DECK</div>

        <div class="holes-container">
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole" style="opacity: 0;"></div> <div class="hole"></div>
            <div class="hole"></div>
            <div class="hole"></div>
        </div>
    </div>

    <div class="controls">
        <a href="/" class="btn">RETURN TO MAIN CONSOLE</a>
        
        <a href="https://stats.uptimerobot.com/1Ctp1MdrMI/802808814" target="_blank" class="btn btn-status">
            <span class="status-dot"></span>
            Check System Status
        </a>
    </div>

</body>
</html>
